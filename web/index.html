<!DOCTYPE html>
<html>
<head>
    <title>Volume Calculator</title>

    <script>
        function changeShape() {
            let shape = document.getElementById("shape").value;

            document.getElementById("cube").style.display = "none";
            document.getElementById("cuboid").style.display = "none";
            document.getElementById("sphere").style.display = "none";
            document.getElementById("tetrahedron").style.display = "none";
            document.getElementById("torus").style.display = "none";
            document.getElementById("ellipsoid").style.display = "none";

            document.getElementById(shape).style.display = "block";
        }

        function testInvalidShape() {
            window.location.href = "volume?shape=banana";
        }

        window.onload = function () {
            changeShape();

            const params = new URLSearchParams(window.location.search);

            if (params.has("error")) {
                document.getElementById("message").style.color = "red";
                document.getElementById("message").innerText =
                    "Error: " + params.get("error");
            }

            if (params.has("result")) {
                document.getElementById("message").style.color = "green";
                document.getElementById("message").innerText =
                    "Volume = " + params.get("result");
            }
        }
    </script>

</head>

<body>

<h2>Volume Calculator</h2>

<div id="message" style="font-weight:bold;"></div>

<form action="volume" method="get">

    <h3>Select shape</h3>

    <select name="shape" id="shape" onchange="changeShape()">
        <option value="cube">Cube</option>
        <option value="cuboid">Cuboid</option>
        <option value="sphere">Sphere</option>
        <option value="tetrahedron">Tetrahedron</option>
        <option value="torus">Torus</option>
        <option value="ellipsoid">Ellipsoid</option>
    </select>

    <br><br>

    <div id="cube">
        Side:
        <br>
        <input type="number" step="any" name="side">
    </div>

    <div id="cuboid">
        Length:
        <br>
        <input type="number" name="length"><br><br>

        Width:
        <br>
        <input type="number" name="width"><br><br>

        Height:
        <br>
        <input type="number" name="height">
    </div>

    <div id="sphere">
        Radius:
        <br>
        <input type="number" name="radius">
    </div>

    <div id="tetrahedron">
        Edge:
        <br>
        <input type="number" name="edge">
    </div>

    <div id="torus">
        Major Radius:
        <br>
        <input type="number" name="majorRadius"><br><br>

        Minor Radius:
        <br>
        <input type="number" name="minorRadius">
    </div>

    <div id="ellipsoid">
        a:
        <br>
        <input type="number" name="a"><br><br>

        b:
        <br>
        <input type="number" name="b"><br><br>

        c:
        <br>
        <input type="number" name="c">
    </div>

    <br><br>

    Precision:
    <br>
    <input type="number" name="precision" value="2">

    <br><br>

    <button type="submit">Calculate Volume</button>

    <br><br>

    <button type="button" onclick="testInvalidShape()">
        Test Invalid Shape
    </button>

</form>

</body>
</html>
